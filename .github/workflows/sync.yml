name: Auto Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: sync
  cancel-in-progress: true

jobs:
  sync-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm init -y --silent && npm install node-fetch@2 --silent
      - name: Sync standard
        run: node sync.js recent
        env:
          OPENFRONT_SKAILEX_ACCESS: ${{ secrets.OPENFRONT_SKAILEX_ACCESS }}
          SYNC_HISTORY_WINDOWS: "500"
      - name: Sync compact
        run: node sync.js --mode=compact recent
        env:
          OPENFRONT_SKAILEX_ACCESS: ${{ secrets.OPENFRONT_SKAILEX_ACCESS }}
          COMPACT_HISTORY_WINDOWS: "500"
      - name: Commit and push (clean)
        run: |
          rm -rf node_modules package.json package-lock.json 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in runs_public.json.gz runs_compact_public.json.gz checkpoint.json checkpoint_compact.json; do
            [ -f "$f" ] && git add "$f" -f
          done
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "[auto] sync standard+compact $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git push && break
            echo "Push rejected, rebasing $i/3..."
            git pull --rebase origin main || (git fetch origin main && git rebase origin/main)
            sleep 2
          done

  retrigger:
    needs: sync-all
    runs-on: ubuntu-latest
    permissions:
      actions: write
    if: ${{ github.event_name == 'schedule' }}
    steps:
      - name: Trigger Pages
        run: |
          sleep 10
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/dispatches -d '{"ref":"main"}' || true
