name: Sync Ranked

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: sync-ranked
  cancel-in-progress: true

jobs:
  sync-ranked:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm init -y --silent && npm install node-fetch@2 --silent
      - run: node sync-ranked.js
        env:
          OPENFRONT_SKAILEX_ACCESS: ${{ secrets.OPENFRONT_SKAILEX_ACCESS }}
      - name: Commit and push ranked
        run: |
          rm -rf node_modules package.json package-lock.json 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in ranked.json ranked.json.gz ranked_history.json.gz; do
            [ -f "$f" ] && git add "$f" -f
          done
          git diff --cached --quiet && { echo "no changes ranked"; exit 0; }
          git commit -m "[auto] sync ranked $(date -u)"
          for i in 1 2 3; do
            git push && break
            echo "Push rejected, rebasing $i/3..."
            git pull --rebase origin main || (git fetch origin main && git rebase origin/main)
            sleep 2
          done
