name: Sync Ranked

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: sync-ranked
  cancel-in-progress: true

jobs:
  sync-ranked:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm init -y --silent && npm install node-fetch@2 --silent
      - run: node sync-ranked.js
        env:
          OPENFRONT_SKAILEX_ACCESS: ${{ secrets.OPENFRONT_SKAILEX_ACCESS }}
      - name: Commit and push
        run: |
          rm -rf node_modules package.json package-lock.json 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in ranked.json ranked.json.gz ranked_history.json.gz; do [ -f "$f" ] && git add "$f" -f; done
          git diff --cached --quiet && { echo "no changes ranked"; exit 0; }
          git commit -m "[auto] sync ranked"
          for i in 1 2 3; do git push && break; git pull --rebase origin main; sleep 2; done

  deploy:
    needs: sync-ranked
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: write
    steps:
      - name: Trigger Pages
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/dispatches -d '{"ref":"main"}' || true

  retrigger:
    needs: [sync-ranked, deploy]
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Reschedule ranked in 60s
        run: |
          sleep 60
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync-ranked.yml/dispatches -d '{"ref":"main"}' || true
