name: Sync Ranked

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

# Evite les chevauchements de chaines retrigger (cause des echecs Pages build)
concurrency:
  group: sync-ranked
  cancel-in-progress: true

jobs:
  sync-ranked:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm init -y --silent && npm install node-fetch@2 --silent && node -e "const p=require('./package.json');p.type='module';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
      - run: node sync-ranked.js
        env:
          OPENFRONT_SKAILEX_ACCESS: ${{ secrets.OPENFRONT_SKAILEX_ACCESS }}
      - name: Commit et push (ranked)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf node_modules package.json package-lock.json 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in ranked.json ranked.json.gz ranked_history.json ranked_history.json.gz; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet && { echo "no changes ranked"; exit 0; }
          git commit -m "[auto] sync ranked"
          CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD 2>/dev/null | tr '\n' ' ')
          if [ -z "$CHANGED" ]; then echo "No changed files to push"; exit 0; fi
          echo "Pushing: $CHANGED"
          python3 push_via_api.py "[auto] sync ranked" $CHANGED

  retrigger:
    needs: sync-ranked
    runs-on: ubuntu-latest
    permissions:
      actions: write
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    steps:
      - name: Re-declencher dans 60 secondes (cycle ~1 min)
        run: |
          sleep 60
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync-ranked.yml/dispatches -d '{"ref":"main"}' || echo "Redeclenchement programme"
        shell: bash
